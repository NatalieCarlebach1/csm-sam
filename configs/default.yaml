# CSM-SAM Default Training Configuration
# Edit paths and hyperparameters before training.

# ─── Data ────────────────────────────────────────────────────────────────────
data:
  data_dir: "data/processed"           # preprocessed dataset directory
  image_size: 512                      # dataset-side resize (SAM2 still resizes to 1024² internally)
  batch_size: 16                       # training batch size
  num_workers: 8                       # dataloader workers per rank (16 OOM'd host RAM on 4-GPU DDP with cache=16)
  pin_memory: true
  tumor_ratio: 0.7                     # fraction of training slices with tumor

# ─── Model ───────────────────────────────────────────────────────────────────
model:
  sam2_checkpoint: "checkpoints/sam2/sam2.1_hiera_base_plus.pt"
  sam2_cfg: "configs/sam2.1/sam2.1_hiera_b+"  # SAM2.1 Base+ hydra cfg
  encoder_type: "dino_sam"              # "sam2" (Hiera) | "dino_sam" (frozen DINOv2 + trainable Bridge → SAM2 decoder; default on tals-local)
  dino_variant: "dinov2_base"           # used when encoder_type=dino_sam. See csmsam/modeling/dino_encoder.DINO_VARIANTS
  dino_img_size: 518                    # DINO input size (should be a multiple of patch_size; 518 = 37×14)
  dino_feature_layers: null             # null = equally spaced quarter/half/three-quarter/last
  d_model: 256                         # feature dimension (matches SAM2-L)
  num_heads: 8                         # attention heads
  n_memory_frames: 8                   # pre-RT slices encoded into memory
  spatial_pool_size: 32                # spatial pool for pre-RT memory encoder (M_pre)
  memory_bank_max_slices: 128          # M_mid cap: span the full mid-RT volume (Option 2: within-volume 3D context via attention, no 3D backbone)
  mid_memory_pool_size: 16             # pool enhanced_feats (h×w=64²=4096) → 16²=256 tokens/slice before appending to M_mid → keeps attention O(N²) tractable at 128-slice memory
  max_weeks: 12                        # max weeks for temporal embedding
  dropout: 0.0                         # attention dropout
  temporal_encoder_type: "continuous"    # "continuous" (default) | "discrete" (ablation)
  temporal_hidden_dim: 16                 # shrunk: HNTS weeks_elapsed is ~constant (always ~3)
  temporal_n_frequencies: 2               # shrunk: no meaningful temporal variation in HNTS
  prompt_dropout: 0.3                     # fraction of train steps that drop the pre-RT mask prompt
                                          # (breaks the "just copy the prior" overfit seen on 51652)

# ─── Training ────────────────────────────────────────────────────────────────
training:
  epochs: 200
  lr: 2e-4                            # novel modules LR — conservative with decoder now trainable
  lr_decoder: 2e-5                    # SAM2 decoder LR (lr * 0.1 scale)
  weight_decay: 0.01
  warmup_epochs: 5                    # short warmup — lets newly-unfrozen decoder settle
  scheduler: "cosine"                 # "cosine" | "step" | "plateau"
  gradient_clip_norm: 1.0
  amp: true                           # automatic mixed precision
  accumulate_grad_batches: 1          # eff_bs = 16 (bs) × 4 (GPUs) = 64 — no extra accum needed
  sequence_length: 4                  # number of consecutive mid-RT slices per training step; 1 = single-slice
  sequence_mode: true                 # enable sequence training

# ─── Loss ────────────────────────────────────────────────────────────────────
loss:
  lambda_dice: 1.0
  lambda_bce: 0.5                     # keep small — primary signal is Dice; high BCE destabilises on sparse tumors
  lambda_change: 0.1                  # change map auxiliary loss weight (was 0.3)
  change_class_weights: [0.1, 1.0, 2.0, 2.0]  # [background, stable, grown, shrunk]
  gtvn_weight: 1.0                    # relative weight of GTVn channel vs GTVp channel in the loss
  lambda_consistency: 0.1             # longitudinal feature consistency loss (was 0.5; too loud)
  consistency_fg: 1.0                 # tumor-region weight (inside union mask)
  consistency_bg: 0.1                 # background weight (outside union mask)
  lambda_iou: 0.0                     # IoU-head supervision — disabled on tals-local: dino_sam uses multimask_output=False (1 mask, no 3-candidate argmax), so there's nothing to calibrate. Re-enable for encoder_type=sam2 runs.

# ─── Cross-Patient Retrieval ─────────────────────────────────────────────────
retrieval:
  enabled: true
  k: 5                 # top-K neighbors
  n_tokens: 16         # tokens per retrieved template (spatial pool)
  gate_init: 0.0       # initial gate logit (0 -> sigmoid(0)=0.5)
  build_on: "train"    # which split to build the bank from
  bank_path: null      # optional path to save/load bank

# ─── Evaluation ──────────────────────────────────────────────────────────────
evaluation:
  val_every_n_epochs: 5               # validate every N epochs
  primary_metric: "agg_dsc"          # metric used for best model selection
  threshold: 0.5                      # sigmoid threshold for binary prediction
  voxel_spacing: [3.0, 1.0, 1.0]     # mm, for HD95

# ─── Checkpointing ───────────────────────────────────────────────────────────
checkpoint:
  output_dir: "checkpoints/csmsam_default"
  save_every_n_epochs: 10
  keep_last_n: 3                      # number of recent checkpoints to keep
  save_best: true                     # always save the best model

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  use_wandb: false                    # set true and configure project below
  wandb_project: "csm-sam"
  wandb_entity: null                  # your wandb username
  log_every_n_steps: 20
  log_images_every_n_epochs: 20       # log sample predictions to wandb

# ─── Hardware ────────────────────────────────────────────────────────────────
hardware:
  device: "cuda"                      # "cuda" | "cpu"
  num_gpus: 1
  seed: 42
